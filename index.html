<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LunarGarden</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f172a, #1e1b4b);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

       
        。moon {
            position: absolute;
            top: 12%;
            right: 15%;
            width: 160px;
            height: 160px;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(216, 224, 255, 0.6), 0 0 150px rgba(180, 190, 255, 0.3);
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

       
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.9; }
        }

      
        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        .title {
            font-size: 52px;
            font-weight: 300;
            letter-spacing: 10px;
            color: #f8fafc;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 18px;
            color: #cbd5e1;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        。divider {
            width: 60px;
            height: 1px;
            background: rgba(255,255,255,0.3);
            margin: 30px auto;
        }

        .desc {
            max-width: 500px;
            line-height: 1.8;
            color: #94a3b8;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <div class="stars" id="stars"></div>
    <div class="moon"></div>

    <div class="container">
        <h1 class="title">  LUNAR GARDEN</h1>
        <p class="subtitle">灰谷风止 · 月华如初 </p>
        <div class="divider"></div>
        <p class="desc"></p>
    </div>

    <script>
      
        const stars = document.getElementById('stars');
        for (let i = 0; i < 70; i++) {
            let star = document.createElement('div');
            star.classList.add('star');
            
            let size = Math.random() * 2 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            
            stars.appendChild(star);
        }
    </script>
</body>
</html>
